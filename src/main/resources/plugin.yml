name: AzoxCmd
main: com.azox.cmd.AzoxCmd
version: 1.0.0
api-version: 1.21
author: AzoxTeam
description: A plugin that provides various commands restricted to administrators.

commands:
  fly:
    description: Toggles flight for the player.
    usage: /fly
    permission: azoxcmd.admin
    permission-message: You do not have permission to use this command.
  flyspeed:
    description: Sets the player's flight speed.
    usage: /flyspeed <speed>
    permission: azoxcmd.admin
    permission-message: You do not have permission to use this command.
  top:
    description: Teleports the player to the highest block at their current location.
    usage: /top
    permission: azoxcmd.admin
    permission-message: You do not have permission to use this command.
  anvil:
    description: Opens an anvil inventory for the player.
    usage: /anvil
    permission: azoxcmd.admin
    permission-message: You do not have permission to use this command.
  craft:
    description: Opens a crafting inventory for the player.
    usage: /craft
    permission: azoxcmd.admin
    permission-message: You do not have permission to use this command.
  wb:
    description: World Builder command (stub).
    usage: /wb
    permission: azoxcmd.admin
    permission-message: You do not have permission to use this command.